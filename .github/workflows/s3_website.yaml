name: Deploy Website to S3 Bucket

on:
  push:
    branches:
      - 'main'
    paths:
      - 'index.html'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          aws-access-key-id: ${{ secrets.ASIAQ46MIMZRM3HBY4N4 }}
          aws-secret-access-key: ${{ secrets.6ivxKkKba0iId/yik9S11DsXSuBtxdQETKp+ckVD }}
          aws-session-token: ${{ secrets. }}
          aws-region: us-east-1
      - name: Copy website to S3
        run: aws s3 sync . s3://inventory-app-vitug-ralph/index.html --exclude "*" --include "index.html"
