name: Deploy Python Functions to AWS Lambda

on:
  push:
    branches:
      - main
    paths:
      - lambda/**
      - .github/workflows/lambda_deploy.yaml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function:
          - add_inventory_item
          - delete_inventory_item
          - get_all_inventory_items
          - get_inventory_item
          - get_location_inventory_items

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Package and deploy ${{ matrix.function }}
        working-directory: ./lambda/${{ matrix.function }}
        run: |
          zip -r function.zip lambda_function.py
          aws lambda update-function-code \
            --function-name "${{ matrix.function }}" \
            --zip-file fileb://function.zip \
            --publish
          rm -f function.zip
